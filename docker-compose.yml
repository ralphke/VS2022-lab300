services:
  sqlserver:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.sqlserver
      platforms:
        - linux/amd64
    container_name: tinyshop-sqlserver
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./src/Products/wwwroot/images:/usr/src/sql/images:ro
      - ./src/Products/SQL:/usr/src/sql/init:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/1433 && echo '' >&3 && exec 3>&- && echo 'success'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  init-db:
    # The init-db service runs after sqlserver is healthy and performs database initialization.
    # sqlserver itself starts normally via the SQL Server entrypoint and should not be given the init script as a command.
    env_file:
      - .env
    image: tinyshop-agentic-init-db:latest
    build:
      context: ./src/Products/SQL
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: tinyshop-sql-init
    volumes:
      - ./src/Products/wwwroot/images:/usr/src/sql/images:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    command: ["/usr/src/sql/init/init-db.sh"]
    restart: "no"

  products:
    env_file:
      - .env
    build:
      context: .
      dockerfile: src/Products/Dockerfile
    container_name: tinyshop-products
    depends_on:
      sqlserver:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
      embeddings:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      EnableHttpsRedirection: "false"
      ConnectionStrings__TinyShopDB: "Server=sqlserver,1433;Database=TinyShopDB;User Id=TinyShopUser;Password=${TinyShopUser_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
      EMBEDDING_SERVICE__ENDPOINT: http://embeddings/embed
    ports:
      - "5228:8080"
    restart: on-failure

  store:
    env_file:
      - .env
    build:
      context: .
      dockerfile: src/Store/Dockerfile
    container_name: tinyshop-store
    depends_on:
      - products
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      EnableHttpsRedirection: "false"
      ProductEndpoint: http://products:8080
      ProductBrowserEndpoint: http://localhost:5228
      Logging__LogLevel__Microsoft.AspNetCore.DataProtection.KeyManagement.XmlKeyManager: Error
    ports:
      - "5158:8080"
    volumes:
      - store-dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: on-failure

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    ports:
      - "8001:80"
    command:
      - --model-id
      - sentence-transformers/all-mpnet-base-v2
    volumes:
      - model-cache:/data
    environment:
      HF_HOME: /data

volumes:
  model-cache:
  sqlserver-data:
  store-dataprotection-keys:
